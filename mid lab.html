<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>
    <style>
       
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            margin-bottom: 30px;
        }

        h2, h3 {
            text-align: center;
            color: #333;
        }

      
        .form-group {
            margin-bottom: 15px;
        }

        
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }

        label.required::after {
            content: " *";
            color: red;
        }

       
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }

        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            background-color: #45a049;
        }

        
        .list-container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Student Registration</h2>
        <form id="registrationForm">
            <div class="form-group">
                <label for="firstName" class="required">First Name</label>
                <input type="text" id="firstName">
            </div>

            <div class="form-group">
                <label for="lastName" class="required">Last Name</label>
                <input type="text" id="lastName">
            </div>

            <div class="form-group">
                <label for="studentId" class="required">Student ID</label>
                <input type="text" id="studentId" placeholder="e.g., 20-12345-1">
            </div>

            <div class="form-group">
                <label for="email" class="required">Email</label>
                <input type="email" id="email" placeholder="username@student.aiub.edu">
            </div>

            <div class="form-group">
                <label for="credits" class="required">Credits Completed</label>
                <input type="number" id="credits" min="0">
            </div>

            <div class="form-group">
                <label for="department" class="required">Department</label>
                <select id="department">
                    <option value="">-- Select Department --</option>
                    <option value="CSE">CSE</option>
                    <option value="EEE">EEE</option>
                    <option value="BBA">BBA</option>
                    <option value="English">English</option>
                </select>
            </div>

            <div class="btn-container">
                <button type="submit">Register</button>
            </div>
        </form>
    </div>

    <div class="list-container">
        <h3>Registered Students</h3>
        <table>
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Student ID</th>
                    <th>Email</th>
                    <th>Credits</th>
                    <th>Department</th>
                </tr>
            </thead>
            <tbody id="studentTableBody">
                </tbody>
        </table>
    </div>

    <script>
        
        const studentsList = [];

     
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            
            event.preventDefault();

          
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const studentId = document.getElementById('studentId').value.trim();
            const email = document.getElementById('email').value.trim();
            const credits = document.getElementById('credits').value.trim();
            const department = document.getElementById('department').value;

            
            if (firstName === "" || lastName === "") {
                alert("First Name and Last Name cannot be empty.");
                return;
            }

            if (!studentId.includes("-")) {
                alert("Student ID must contain a hyphen (-).");
                return;
            }

            if (!email.endsWith("@student.aiub.edu")) {
                alert("Email must end with @student.aiub.edu");
                return;
            }

            
            const creditNum = Number(credits);
            if (credits === "" || creditNum < 0 || creditNum >= 148) {
                alert("Credits completed must be 0 or more, and less than 148.");
                return;
            }

            if (department === "") {
                alert("Please select a Department.");
                return;
            }

            
            const newStudent = {
                firstName: firstName,
                lastName: lastName,
                studentId: studentId,
                email: email,
                credits: creditNum,
                department: department
            };

           
            studentsList.push(newStudent);

            
            updateStudentTable();

            
            document.getElementById('registrationForm').reset();
        });

       
        function updateStudentTable() {
            const tbody = document.getElementById('studentTableBody');
            
            
            tbody.innerHTML = "";

           
            studentsList.forEach(student => {
                const row = `<tr>
                    <td>${student.firstName}</td>
                    <td>${student.lastName}</td>
                    <td>${student.studentId}</td>
                    <td>${student.email}</td>
                    <td>${student.credits}</td>
                    <td>${student.department}</td>
                </tr>`;
                
               
                tbody.innerHTML += row;
            });
        }
    </script>
</body>
</html>
